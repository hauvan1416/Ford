<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford® - New Hybrid & Electric Vehicles, SUVs, Crossovers, Trucks, Vans & Cars</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />

</head>

<body>
    <div class="header">
        <div class="eyebrow">
            <div class="eyebrow__left__item">
                <ul>
                    <li> <a href="https://www.ford.com/bronco/?gnav=eyebrow-brand-brnco">
                            <img src="./img/tải xuống.svg" alt="">
                        </a>
                    </li>
                    <li class="text"> <span>BRONCO</span></li>
                </ul>

            </div>
            <div class="eyebrow__right__item">
                <i class="fas fa-map-marker-alt"></i>
                <span class="texxt">Dealership Locations</span>
            </div>
        </div>
        <div class="nav">
            <div class="container__menu__left">
                <div class="item__logo__ford">
                    <img src="./img/logo.png" alt="">
                </div>
                <div class="item__menu">
                    <ul>
                        <li><a href="">Vehicles</a></li>
                        <li><a href="">Shop</a></li>
                        <li><a href="">Finance</a></li>
                        <li><a href="">Owner</a></li>
                        <li><a href="">Ask Ford</a></li>
                    </ul>
                </div>
            </div>
            <hr>
            <div class="container__menu__right">
                <div class="item__signin menu__right__item">
                    <i class="fal fa-user-circle logo "></i>
                    <span>Sign in</span>
                </div>

                <i class="fas fa-search menu__right__item "></i>
                <div class="item__english menu__right__item">
                    <i class="far fa-globe-americas logo "></i>
                    <span>English</span>
                </div>

            </div>

        </div>

 
    </div>
    <div class="carausel-container">
        <div class="carausel-slide">
            <img src="./img/carowsel1.png " id="lastClone" alt="">
            <img src="./img/carowsel2.png" alt="">
            <img src="./img/carowsel1.png" alt="">
            
            <img src="./img/carowsel2.png" id="firstClone" alt="">
        </div>
        <i class="fal fa-chevron-left Btn" id="prevBtn"></i>
        <i class="fal fa-chevron-right Btn" id="nextBtn"></i> 
    </div>
    
    
    <script type="text/javascript" src="app.js"></script>
    
</body>

</html>
